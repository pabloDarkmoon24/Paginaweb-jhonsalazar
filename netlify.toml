[build]
  command   = "npm run build"
  publish   = "dist"

# La Firebase API key es una clave PÚBLICA por diseño — no es un secreto real.
# Firebase protege los datos mediante Security Rules, no ocultando la API key.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

#Headers de seguridad para todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://consultoriobackend-production.up.railway.app https://connect.facebook.net https://*.epayco.co https://www.gstatic.com https://apis.google.com https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.epayco.co; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com https://*.firebase.com https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://consultoriobackend-production.up.railway.app https://*.epayco.co https://epaycowebhook-i3szq2fqna-uc.a.run.app https://*.google.com https://*.google-analytics.com https://*.googletagmanager.com https://www.merchant-center-analytics.goog https://www.facebook.com https://connect.facebook.net; img-src 'self' data: blob: https: https://www.facebook.com; frame-src https://*.epayco.co https://*.google.com https://www.google.com/maps/; frame-ancestors 'none'"

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
