[build]
  command   = "npm run build"
  publish   = "dist"

# La Firebase API key es una clave PÚBLICA por diseño — no es un secreto real.
# Firebase protege los datos mediante Security Rules, no ocultando la API key.
[build.environment]
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

#Headers de seguridad para todas las páginas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://consultoriobackend-production.up.railway.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://*.googleapis.com https://*.firebaseapp.com https://*.firebase.com https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://consultoriobackend-production.up.railway.app; img-src 'self' data: blob: https:; frame-ancestors 'none'"

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
